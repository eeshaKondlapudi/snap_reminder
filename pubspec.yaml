name: snap_reminder
description: A Flutter app that turns Outlook calendar screenshots into meeting reminders.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  intl: ^0.20.2
  path: ^1.9.0
  shared_preferences: ^2.3.5
  sqflite: ^2.4.1
  google_mlkit_text_recognition: ^0.15.1
  flutter_local_notifications: ^22.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.1.0
  image: ^4.9.1
  url_launcher: ^6.3.2
  crypto: ^3.0.7
  flutter_appauth: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
